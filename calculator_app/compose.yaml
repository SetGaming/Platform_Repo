services:
  calculator-app:
    image: "${IMAGE_URI:-calculator-app}:${IMAGE_TAG:-local}"

    build:
      context: .
      dockerfile: Dockerfile

    container_name: calculator-app

    ports:
      - "${APP_PORT:-5000}:${CONTAINER_PORT:-5000}"

    environment:
      FLASK_ENV: "${FLASK_ENV:-production}"
      FLASK_DEBUG: "${FLASK_DEBUG:-0}"
      PYTHONPATH: "/app"
      SECRET_KEY: "${SECRET_KEY:?SECRET_KEY must be configured in .env}"
      API_TOKEN: "${API_TOKEN:-}"

    restart: unless-stopped

    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import socket; s=socket.create_connection(('127.0.0.1',5000),2); s.close()"
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
