services:
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile

    image: platform-jenkins:local
    container_name: platform-jenkins
    restart: unless-stopped

    ports:
      - "${JENKINS_PORT:-8080}:8080"
      - "${JENKINS_AGENT_PORT:-50000}:50000"

    group_add:
      - "${DOCKER_GID}"

    volumes:
      - /var/jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:8080/login >/dev/null || exit 1"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
